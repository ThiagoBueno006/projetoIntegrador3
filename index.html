<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vital Lâmpadas</title>
    <link rel="stylesheet" href="resetCSS.css">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">
            <h1 class="nome">Vital <span class="nome_laranja">Lâmpadas</span></h1>
        </div>
        <nav>
            <ul class="nav_links">
                <li><a href="index.html">Home</a></li>
                <li><a href="analysis.html">Análises</a></li>
            </ul>
        </nav>
        <div class="acessibilidade" aria-label="Ajustes de acessibilidade">
            <span class="acessibilidade_label">Texto:</span>
            <button id="decreaseText" type="button" aria-label="Diminuir tamanho do texto">A-</button>
            <button id="increaseText" type="button" aria-label="Aumentar tamanho do texto">A+</button>
            <button id="toggleContrast" type="button" aria-label="Alternar contraste alto">C</button>
        </div>
    </header>
    <main class="container">
        <section class="sec1 consulta">
            <div class="pesquisa">
                <h2 class="consulta_titulo">Consulta de Produto</h2>
                <div class="consulta_pesquisa">
                    <div class="consulta_pesquisa_barra">
                        <form id="formPesquisa">
                            <input id="produtoPesquisa" class="caixa_pesquisa" type="text" placeholder="Pesquisar produto..." />
                            <button class="botao_pesquisa" type="submit">🔍</button>
                        </form>
                    </div>
                </div> 
                <!-- <div class="autocomplete">
                    <input 
                    type="text" 
                    id="inputProduto" 
                    placeholder="Pesquisar produto..." 
                    autocomplete="off"
                    />
                    <div id="listaSugestoes" class="sugestoes"></div>
                </div> -->
            </div>

            <div class="consulta_resultado">
                <h2 class="consulta_resultado_titulo">Informações do Produto</h2>
                <div class="consulta_resultado_descricao">
                    <p>Pesquise um produto para ver os detalhes.</p>
                </div>
            </div>
        </section>
    
        <section class="sec2 movimento">
            <h2 class="movimento__titulo">Movimentação de Estoque</h2>
            <div class="movimento__estoque">
                <div class="movimento__controle">
                    <label for="movimentoQuantidade">Quantidade</label>
                    <input id="movimentoQuantidade" type="number" min="1" value="1" />
                </div>
                <div class="movimento__botoes">
                    <button id="buttonEntrada" type="button"><p>Registrar Entrada</p></button>
                    <button id="buttonSaida" type="button"><p>Registrar Saída</p></button>
                </div>
                <div id="mensagemMovimentacao" class="movimentacao_mensagem"></div>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
    <script src="a11y.js"></script>
</body>
</html>
